<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your shopping cart – ArtBridge handcrafted artisan marketplace.">
    <title>My Cart – ArtBridge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" role="navigation">
        <div class="logo" onclick="window.location.href='/'">ArtBridge</div>
        <div class="nav-links">
            <a href="/" class="back-link" id="backToShop">← Back to Shop</a>
            <span class="nav-separator">|</span>
            {% if session.get('customer_name') %}
                <span class="nav-btn" style="cursor:default;">👋 {{ session.get('customer_name') }}</span>
                <span class="nav-btn" onclick="fetch('/api/logout',{method:'POST'}).then(()=>window.location.href='/')" title="Logout" style="color:#e07070;">Logout</span>
            {% else %}
                <span class="nav-btn" onclick="window.location.href='/login'">Login</span>
            {% endif %}
        </div>
    </nav>

    <div class="page-wrap">
        <h1 class="page-title">🛒 My Cart</h1>
        <p class="page-subtitle" id="cartSubtitle">Loading your cart…</p>

        <div id="cartContainer" aria-live="polite"></div>

        <p id="cartEmptyMessage" style="display:none;">
            <div class="empty-state">
                <div class="empty-icon">🛒</div>
                <h3>Your cart is empty</h3>
                <p>Head back to the shop and find something you love.</p>
            </div>
        </p>

        <div class="cart-summary" id="cartSummary" style="display:none;">
            <div class="cart-summary-row">
                <span>Subtotal</span>
                <span id="cartSubtotal">₹0</span>
            </div>
            <div class="cart-summary-row">
                <span>Shipping</span>
                <span style="color: var(--success);">Free</span>
            </div>
            <div class="cart-summary-row total">
                <span>Total</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button class="btn-primary" style="width:100%; margin-top:20px; padding:14px; font-size:15px;"
                    onclick="window.location.href='/'"
                    id="continueShoppingBtn">Continue Shopping</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="{{ url_for('static', filename='cart.js') }}"></script>
</body>
</html>
